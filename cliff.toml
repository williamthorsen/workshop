# git-cliff configuration
# See https://git-cliff.org/docs/configuration

[changelog]
# changelog header
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
# template for the changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
            {% if commit.breaking %}[**breaking**] {% endif %}\
            {{ commit.message | upper_first }}\
    {% endfor %}
{% endfor %}\n
"""
# template for the changelog footer
footer = """
<!-- generated by git-cliff -->
"""
# remove the leading and trailing whitespace from the templates
trim = true

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = false
# filter out the commits that are not conventional
filter_unconventional = false
# process each line of a commit as an individual commit
split_commits = false
# regex for preprocessing the commit messages
commit_preprocessors = []
# regex for parsing and grouping commits
# Supports "type: desc", "scope|type: desc", and "type(scope): desc" formats.
# Each parser tolerates an optional ticket-ID prefix: "TOOL-123 ", "#150 ", "#123-1 ", "#123.1 ".
#   ticket_prefix = ([A-Z]+-\d+\s+|\#\d+([.\-]\d+)?\s+)?
commit_parsers = [
  { message = "^release:", skip = true },
  { message = "^([A-Z]+-\\d+\\s+|\\#\\d+([.\\-]\\d+)?\\s+)?(.*\\|)?fix(\\(.*\\))?(!)?:", group = "Bug fixes" },
  { message = "^([A-Z]+-\\d+\\s+|\\#\\d+([.\\-]\\d+)?\\s+)?(.*\\|)?bugfix(\\(.*\\))?(!)?:", group = "Bug fixes" },
  { message = "^([A-Z]+-\\d+\\s+|\\#\\d+([.\\-]\\d+)?\\s+)?(.*\\|)?feat(\\(.*\\))?(!)?:", group = "Features" },
  { message = "^([A-Z]+-\\d+\\s+|\\#\\d+([.\\-]\\d+)?\\s+)?(.*\\|)?feature(\\(.*\\))?(!)?:", group = "Features" },
  { message = "^([A-Z]+-\\d+\\s+|\\#\\d+([.\\-]\\d+)?\\s+)?(.*\\|)?internal(\\(.*\\))?(!)?:", group = "Internal" },
  { message = "^([A-Z]+-\\d+\\s+|\\#\\d+([.\\-]\\d+)?\\s+)?(.*\\|)?refactor(\\(.*\\))?(!)?:", group = "Refactoring" },
  { message = "^([A-Z]+-\\d+\\s+|\\#\\d+([.\\-]\\d+)?\\s+)?(.*\\|)?tests?(\\(.*\\))?(!)?:", group = "Tests" },
  { message = "^([A-Z]+-\\d+\\s+|\\#\\d+([.\\-]\\d+)?\\s+)?(.*\\|)?tooling(\\(.*\\))?(!)?:", group = "Tooling" },
  { message = "^([A-Z]+-\\d+\\s+|\\#\\d+([.\\-]\\d+)?\\s+)?(.*\\|)?ci(\\(.*\\))?(!)?:", group = "CI" },
  { message = "^([A-Z]+-\\d+\\s+|\\#\\d+([.\\-]\\d+)?\\s+)?(.*\\|)?deps?(\\(.*\\))?(!)?:", group = "Dependencies" },
  { message = "^([A-Z]+-\\d+\\s+|\\#\\d+([.\\-]\\d+)?\\s+)?(.*\\|)?docs?(\\(.*\\))?(!)?:", group = "Documentation" },
  { message = "^([A-Z]+-\\d+\\s+|\\#\\d+([.\\-]\\d+)?\\s+)?(.*\\|)?fmt(\\(.*\\))?(!)?:", group = "Formatting" },
]
# protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = false
# filter out the commits that are not matched by commit parsers
filter_commits = true
# regex for matching git tags
tag_pattern = "v[0-9].*"
# regex for skipping tags
skip_tags = ""
# regex for ignoring tags
ignore_tags = ""
# sort the tags topologically
topo_order = false
# sort the commits inside sections by oldest/newest order
sort_commits = "oldest"
