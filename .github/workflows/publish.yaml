# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Publish

on:
  push:
    tags:
      - '*-v[0-9]*.[0-9]*.[0-9]*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    uses: williamthorsen/node-monorepo-tools/.github/workflows/publish.reusable.yaml@workflow/publish-v1
    with:
      provenance: true
      tags: ${{ github.ref_name }}
