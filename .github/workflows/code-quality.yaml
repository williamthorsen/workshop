# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Code quality checks

# Note: This workflow will be automatically skipped if the commit message includes
# any of the following strings: [skip ci], [ci skip], [no ci], [skip actions], or [actions skip]

on:
  push:
    branches:
      - main
      - next

  pull_request:
    branches:
      - main
      - next

  workflow_dispatch: {}

# Concurrency is caller-owned from @v6 onward. Declared at workflow level so a superseded run is
# cancelled while the current run's legs stay intact.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  code-quality:
    uses: williamthorsen/.github/.github/workflows/code-quality-pnpm-workflow.yaml@v7
    with:
      check-command: pnpm exec nmr build && pnpm exec nmr check:strict
